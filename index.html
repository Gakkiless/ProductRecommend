<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #efe7db;
      --panel: rgba(255, 250, 242, 0.92);
      --panel-strong: #fffaf3;
      --ink: #231915;
      --muted: #6d5c51;
      --line: rgba(105, 64, 32, 0.12);
      --accent: #8a4f24;
      --accent-2: #c88b54;
      --accent-soft: rgba(138, 79, 36, 0.1);
      --shadow: 0 22px 60px rgba(62, 34, 18, 0.12);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200, 139, 84, 0.24), transparent 24%),
        radial-gradient(circle at right 18%, rgba(138, 79, 36, 0.12), transparent 22%),
        linear-gradient(180deg, #ece1d0 0%, #f4ede4 46%, #efe6da 100%);
    }

    .app {
      width: min(1380px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .chat-panel, .state-panel, .message, .result-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .chat-panel, .state-panel {
      border-radius: var(--radius-xl);
      padding: 22px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1, h2, h3, h4, p { margin: 0; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .chat-panel {
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .chat-head h2, .state-head h2 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .chat-head p, .state-head p, .muted {
      color: var(--muted);
      line-height: 1.75;
    }

    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .quick-prompts button, .send-button, .clear-button {
      border: none;
      cursor: pointer;
      font: inherit;
    }

    .quick-prompts button {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      transition: transform 140ms ease;
    }

    .quick-prompts button:hover { transform: translateY(-1px); }

    .messages {
      overflow: auto;
      padding-right: 6px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .message {
      border-radius: 18px;
      padding: 16px;
      max-width: min(100%, 860px);
    }

    .message.user {
      justify-self: end;
      background: linear-gradient(135deg, #9c5a2b, #7d431d);
      color: #fff8f2;
    }

    .message.assistant {
      background: var(--panel-strong);
    }

    .message-meta {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .message.user .message-meta {
      color: rgba(255, 248, 242, 0.78);
    }

    .message-body {
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-stack {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .result-card {
      border-radius: var(--radius-lg);
      padding: 16px;
      background: rgba(255, 248, 239, 0.98);
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .result-top h4 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .score {
      flex: none;
      min-width: 74px;
      padding: 8px 10px;
      text-align: center;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4dfc6, #e5b888);
      color: var(--accent);
      font-weight: 800;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .pill {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(138, 79, 36, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
      margin: 10px 0 6px;
    }

    .bullet-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      resize: vertical;
      min-height: 88px;
      max-height: 200px;
      border: 1px solid rgba(113, 63, 30, 0.16);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 252, 247, 0.98);
    }

    .send-button, .clear-button {
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 800;
    }

    .send-button {
      color: #fff8f1;
      background: linear-gradient(135deg, #a05e30, #7b421c);
    }

    .clear-button {
      background: rgba(138, 79, 36, 0.1);
      color: var(--accent);
    }

    .state-panel {
      position: sticky;
      top: 20px;
      display: grid;
      gap: 16px;
    }

    .slot-list {
      display: grid;
      gap: 10px;
    }

    .slot {
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 248, 239, 0.88);
      border: 1px solid rgba(113, 63, 30, 0.08);
    }

    .slot-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .slot-value {
      color: var(--muted);
      line-height: 1.6;
    }

    .state-note {
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(200, 139, 84, 0.12), rgba(138, 79, 36, 0.06));
      color: var(--muted);
      line-height: 1.75;
    }

    .auth-panel {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.9);
      border: 1px solid rgba(113, 63, 30, 0.08);
    }

    .auth-panel input {
      width: 100%;
      border: 1px solid rgba(113, 63, 30, 0.16);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255, 252, 247, 0.98);
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .token-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .mini-button {
      border: none;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      background: rgba(138, 79, 36, 0.1);
      color: var(--accent);
    }

    .auth-status {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .group-table-wrap {
      margin-top: 12px;
      overflow: auto;
      border: 1px solid rgba(113, 63, 30, 0.08);
      border-radius: 14px;
      background: rgba(255, 252, 247, 0.98);
    }

    .group-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .group-table th, .group-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(113, 63, 30, 0.08);
      white-space: nowrap;
    }

    .group-table th {
      background: rgba(244, 233, 219, 0.94);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .group-table tbody tr:nth-child(even) {
      background: rgba(255, 248, 239, 0.6);
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .state-panel { position: static; }
    }

    @media (max-width: 720px) {
      .app { width: min(100% - 16px, 1380px); padding-top: 10px; }
      .chat-panel, .state-panel { padding: 16px; }
      .composer { grid-template-columns: 1fr; }
    }
  </style>
</head>

      if (pure.length === 2 && pure[0] === "十") return 10 + map[pure[1]];
      if (pure.length === 2 && pure[1] === "十") return map[pure[0]] * 10;
      if (pure.length === 3 && pure[1] === "十") return map[pure[0]] * 10 + map[pure[2]];
      if (pure.length === 1 && map[pure] !== undefined) return map[pure];
      return Number.NaN;

          score += 8;
          reasons.push("晚数接近，适合作为备选或轻微变形方案。");
        } else if (gap >= 3) {
          score -= 14;
          risks.push("晚数差距偏大，若推进通常要调整结构。");
        }
      }

      if (slotState.productForm) {
        if (product.forms.includes(slotState.productForm)) {
          score += 15;
          reasons.push(`符合客户偏好的${slotState.productForm}形态。`);
        } else {
          score -= 16;
          risks.push(`当前产品主形态不是${slotState.productForm}。`);
        }
      }

      if (slotState.month) {
        if (product.seasonMonths.includes(slotState.month)) {
          score += 10;
          reasons.push("出行月份在产品较优窗口内。");
        } else {
          score -= 18;
          risks.push("客户出行月份不是该产品的强窗口，需谨慎推荐。");
        }
      }

      if (slotState.preference) {
        const pref = slotState.preference;
        if (pref === "自然风景" && product.tags.some((tag) => ["自然", "风景", "高景观", "冰川"].includes(tag))) {
          score += 10;
          reasons.push("自然景观卖点较强。");
        }
        if (pref === "人文寺院" && product.tags.some((tag) => ["人文", "寺院", "文化"].includes(tag))) {
          score += 10;
          reasons.push("人文和文化浓度更高。");
        }
        if (pref === "徒步户外" && product.intensity !== "light") {
          score += 8;
          reasons.push("更适合偏户外体验的客人。");
        }
        if (pref === "美食茶咖" && product.tags.some((tag) => ["美食", "咖啡", "茶文化"].includes(tag))) {
          score += 12;
          reasons.push("茶咖啡和风味体验匹配度高。");
        }
        if (pref === "轻松度假" && product.intensity === "light") {
          score += 12;
          reasons.push("节奏相对轻松，更容易承接。");
        }
      }

      if (slotState.children) {
        if (product.familyFriendly) {
          score += 10;
          reasons.push("对儿童同行更友好。");
        } else {
          score -= 14;
          risks.push("儿童同行体验可能不够理想。");
        }
      }

      if (slotState.elders) {
        if (product.elderFriendly) {
          score += 10;
          reasons.push("老人同行更容易承接。");
        } else {
          score -= 14;
          risks.push("老人同行可能受强度和高海拔影响。");
        }
      }

      if (slotState.foreignGuests) {
        if (product.foreignerReady) {
          reasons.push("有外籍客人时，这条线相对更容易进入正式核验流程。");
        } else {
          score -= 4;
          risks.push("若有外籍客人，仍需单独核验证照和执行限制。");
        }
      }

      if (slotState.budget === "价格敏感" && product.tags.some((tag) => ["低空", "高端", "稀缺"].includes(tag))) {
        score -= 18;
        risks.push("客户价格敏感，这条产品承接难度偏高。");
      }

      if (slotState.customization === "深度定制" && !product.tags.includes("经典")) {
        score += 4;
      }

      return {
        ...product,
        score: Math.max(0, Math.min(100, score)),
        reasons: [...new Set(reasons)].slice(0, 4),
        risks: [...new Set(risks)].slice(0, 4),
      };
    }

    function estimatePrice(product) {
      const form = slotState.productForm && product.forms.includes(slotState.productForm)
        ? slotState.productForm
        : product.forms[0];

      const adultUnit = product.pricing[form];
      const adults = slotState.adults || slotState.travelers || 2;
      const children = slotState.children || 0;
      const season = getSeasonPricingContext(product.destination, slotState.month, slotState.dateText);
      const adjustedAdult = Math.round(adultUnit * season.multiplier);

      let totalMin = 0;
      let totalMax = 0;
      let note = "";

      if (form === "自由行") {
        if (adults === 1 && children === 0) {
          totalMin = adjustedAdult * 2;
          totalMax = totalMin;
          note = "自由行 1 人通常按 1 套（2 人套价）承接。";
        } else if (adults >= 4 && children === 0) {
          totalMin = Math.round(adjustedAdult * adults * 0.9);
          totalMax = totalMin;
          note = "按多人同行折扣做了简化预估。";
        } else {
          totalMin = adjustedAdult * adults;
          totalMax = totalMin;
        }
      } else if (form === "私享管家") {
        if (adults === 1 && children === 0) {
          totalMin = Math.round(adjustedAdult * 2 * 0.8);
          totalMax = totalMin;
          note = "按单人私享约 0.8 套做简化预估。";
        } else if (adults === 3 && children === 0) {
          totalMin = Math.round(adjustedAdult * 2 * 1.5);
          totalMax = Math.round(adjustedAdult * 2 * 1.8);
          note = "3 位成人私享按不同资源使用方式会有区间。";
        } else {
          totalMin = adjustedAdult * adults;
          totalMax = totalMin;
        }
      } else {
        totalMin = adjustedAdult * adults;
        totalMax = totalMin;
        if (adults < 4) {
          note = "主题团最终还会受成团人数影响，这里按客单价简化预估。";
        }
      }

      if (children > 0) {
        const childLow = form === "主题团" ? 0.5 : 0.4;
        const childHigh = form === "私享管家" ? 0.8 : 0.7;
        totalMin += Math.round(adjustedAdult * children * childLow);
        totalMax += Math.round(adjustedAdult * children * childHigh);
        note = note
          ? note + " 儿童年龄未明确，先按常见儿童折扣区间估算。"
          : "儿童年龄未明确，先按常见儿童折扣区间估算。";
      }

      return {
        form,
        seasonLabel: season.label,
        adultUnit: adjustedAdult,
        totalMin,
        totalMax: Math.max(totalMin, totalMax),
        note: note ? `${season.note} ${note}` : `${season.note} 最终仍需以实际房型、资源、儿童年龄和车司管配置核价。`,
      };
    }

    function formatCurrency(value) {
      return value.toLocaleString("zh-CN");
    }

    function buildTravelGroupQuery(title) {
      const { beginDate, endDate } = buildDateRange();
      const begin = new Date(`${beginDate}T00:00:00+08:00`);
      const end = new Date(`${endDate}T00:00:00+08:00`);
      return {
        firstResult: 0,
        pageSize: 100,
        ota: "DIRECT",
        otaChannel: "CRS",
        category: "",
        categorySub: "",
        companyCode: "",
        companyLevel: "",
        gcLevel: "001",
        itineraryDay: slotState.days || null,
        rendezvous: "",
        title,
        travelGroupCode: "",
        travelType: "",
        stas: "I",
        findAll: false,
        beginAndEndDate: [begin.toISOString(), end.toISOString()],
        beginDate,
        endDate
      };
    }

    async function fetchTravelGroups(title) {
      const token = sanitizeToken(getStoredToken());
      if (!token) return [];

      const url = `${GDS_BASE_URL}/product-journey/bks/travelGroupProvider/listTravelGroupForOrder?firstResult=0&pageSize=100&unitCode=${encodeURIComponent(GDS_UNIT_CODE)}`;
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify(buildTravelGroupQuery(title))
      });

      if (!response.ok) {
        throw new Error(`生产接口请求失败（${response.status}）`);
      }

      const payload = await response.json();
      return Array.isArray(payload?.retVal?.datas) ? payload.retVal.datas : [];
    }

    function getLiveQueryTerms(product) {
      return {
        directTerms: uniq([...(LIVE_QUERY_HINTS[product.id] || []), product.name]),
        fallbackTerms: uniq([product.line, ...(product.destinations || []).slice(0, 2)])
      };
    }

    function mapLiveGroup(row) {
      return {
        travelGroupCode: row.travelGroupCode,
        travelType: row.travelType,
        travelTypeDesc: row.travelTypeDesc,
        businessType: row.categorySubDesc || row.categoryDesc || "",
        itineraryDesc: row.itineraryDesc,
        groupBeginDate: row.groupBeginDate ? row.groupBeginDate.slice(0, 10) : "",
        groupEndDate: row.groupEndDate ? row.groupEndDate.slice(0, 10) : "",
        productNum: Number(row.productNum || 0),
        soldNum: Number(row.soldNum || 0),
        saleNum: Number(row.saleNum || 0),
        startingPrice: Number(row.startingPrice || 0)
      };
    }

    function groupMatchesProduct(group, product) {
      const nameText = normalizeText(group.travelTypeDesc || "");
      const metaText = normalizeText(`${group.businessType || ""} ${group.itineraryDesc || ""}`);
      const attachKeywords = uniq([...(LIVE_ATTACH_HINTS[product.id] || []), product.name]).map(normalizeText);
      const fallbackKeywords = uniq([product.line]).map(normalizeText);

      const nameHit = attachKeywords.some((keyword) => nameText.includes(keyword));
      const fallbackHit = fallbackKeywords.some((keyword) => metaText.includes(keyword));
      if (!nameHit && !fallbackHit) return false;

      if (slotState.productForm) {
        const formText = `${group.businessType} ${group.travelTypeDesc}`.replace(/\s+/g, "");
        if (!formText.includes(slotState.productForm)) return false;
      }

      if (slotState.nights) {
        const days = slotState.days || slotState.nights + 1;
        const compact = `${group.travelTypeDesc || ""}${group.itineraryDesc || ""}${group.businessType || ""}`.replace(/\s+/g, "");
        if (!compact.includes(`${slotState.nights}晚${days}天`) && !compact.includes(`${slotState.nights}晚`) && !compact.includes(`${days}天`)) {
          return false;
        }
      }

      return true;
    }

    async function enrichWithLiveGroups(cards) {
      const token = getStoredToken();
      if (!token) {
        return cards.map((card) => ({ ...card, liveQueryEnabled: false, liveGroups: [] }));
      }

      const enriched = [];
      for (const card of cards) {
        const { directTerms, fallbackTerms } = getLiveQueryTerms(card.product);
        const merged = new Map();

        const directResults = await Promise.all(directTerms.map(fetchTravelGroups));
        directResults.flat().map(mapLiveGroup).forEach((group) => {
          if (!groupMatchesProduct(group, card.product)) return;
          if (group.saleNum <= 0) return;
          merged.set(group.travelGroupCode, group);
        });

        if (merged.size === 0 && fallbackTerms.length) {
          const fallbackResults = await Promise.all(fallbackTerms.map(fetchTravelGroups));
          fallbackResults.flat().map(mapLiveGroup).forEach((group) => {
            if (!groupMatchesProduct(group, card.product)) return;
            if (group.saleNum <= 0) return;
            merged.set(group.travelGroupCode, group);
          });
        }

        enriched.push({
          ...card,
          liveQueryEnabled: true,
          liveGroups: [...merged.values()]
            .sort((a, b) => {
              if (a.groupBeginDate === b.groupBeginDate) {
                return a.travelGroupCode.localeCompare(b.travelGroupCode, "zh-CN");
              }
              return a.groupBeginDate.localeCompare(b.groupBeginDate, "zh-CN");
            })
            .slice(0, 8)
        });
      }
      return enriched;
    }

    async function buildRecommendationResponse() {
      const candidateProducts = PRODUCTS.filter((product) => {
        if (slotState.destination && product.destination !== slotState.destination) {
          return false;
        }
        if (slotState.productForm && !product.forms.includes(slotState.productForm)) {
          return false;
        }
        return true;
      });

      const ranked = candidateProducts
        .map(scoreProduct)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

      if (!ranked.length) {
        return {
          intro: "当前目的地下我还没有可用的产品候选，建议先确认是否接受相邻区域产品，或者补充更多需求后再判断。",
          cards: [],
        };
      }

      const top = ranked[0];
      const destinationLabel = destinationMap.find((item) => item.key === slotState.destination)?.label || "未指定";
      const intro = `我先按当前信息给你做一版销售建议：客户更适合往“${destinationLabel}”方向推进，优先推荐标品，必要时再转轻微变形或定制。以下是当前更合适的产品。`;

      const cards = ranked.map((product) => {
        const price = estimatePrice(product);
        return {
          title: product.name,
          meta: `${product.line} · ${product.route} · ${product.nights}晚 · ${price.form}`,
          score: product.score,
          description: product.description,
          itinerary: product.itinerary,
          tags: product.tags.slice(0, 6),
          reasons: product.reasons.length ? product.reasons : ["与当前需求整体相容度较高。"],
          risks: product.risks,
          priceText: price.totalMin === price.totalMax
            ? `预估总价：约 ¥${formatCurrency(price.totalMin)}（${price.seasonLabel}）`
            : `预估总价：约 ¥${formatCurrency(price.totalMin)} - ¥${formatCurrency(price.totalMax)}（${price.seasonLabel}）`,
          unitText: `预估成人客单参考：约 ¥${formatCurrency(price.adultUnit)} / 人（${price.seasonLabel}）`,
          note: price.note,
          salesTip: buildSalesTip(product, top === product),
          product,
        };
      });

      return { intro, cards: await enrichWithLiveGroups(cards) };
    }

    function buildSalesTip(product, isTop) {
      if (slotState.customization === "深度定制") {
        return `建议先用 ${product.name} 当母版，继续确认首尾酒店、房型、活动和车司管要怎么变，再判断是否进入定制计价。`;
      }
      if (slotState.children) {
        return `建议先卖 ${product.name} 的体验和节奏，再补充儿童占床/加床与儿童价规则，避免后面客户对价格结构产生疑问。`;
      }
      if (isTop) {
        return `建议把 ${product.name} 放第一顺位，同时准备 1 条相近备选，围绕“景观强度、节奏轻重、产品形态”做对比，会比直接聊价格更容易推进。`;
      }
      return `这条更适合作为备选方案，方便客户在“更轻松 / 更深度 / 更高景观”之间做对比。`;
    }

    function buildFollowUpResponse(missing) {
      const summary = renderSlotSummaryText();
      let question = "";
      if (missing.length === 1) question = `我还差 1 个关键信息：${missing[0]}。`;
      else question = `我还差几个关键信息：${missing.join("、")}。`;

      return `${question}\n\n目前我已经识别到：${summary}\n\n你继续补一句就行，例如：“4 月出发，5 晚 6 天，2 大 1 小，想轻松一点”。`;
    }

    function renderSlotSummaryText() {
      const map = {
        destination: destinationMap.find((item) => item.key === slotState.destination)?.label,
        month: slotState.month ? `${slotState.month}月` : null,
        dateText: slotState.dateText || null,
        nights: slotState.nights ? `${slotState.nights}晚` : null,
        travelers: slotState.travelers ? `${slotState.travelers}人` : null,
        adults: slotState.adults ? `${slotState.adults}位成人` : null,
        children: slotState.children ? `${slotState.children}位儿童` : null,
        productForm: slotState.productForm,
        preference: slotState.preference,
        budget: slotState.budget,
      };
      const values = Object.values(map).filter(Boolean);
      return values.length ? values.join("，") : "暂时还没有识别到完整需求";
    }

    function slotRows() {
      return [
        ["目的地方向", destinationMap.find((item) => item.key === slotState.destination)?.label || "未识别"],
        ["出行日期", slotState.dateText || (slotState.month ? `${slotState.month}月` : "未识别")],
        ["晚数 / 天数", slotState.nights ? `${slotState.nights}晚${slotState.nights + 1}天` : "未识别"],
        ["人数", slotState.travelers ? `${slotState.travelers}人` : "未识别"],
        ["成人 / 儿童", `${slotState.adults || 0}位成人 / ${slotState.children || 0}位儿童`],
        ["老人同行", slotState.elders ? "有" : "无"],
        ["外籍客人", slotState.foreignGuests ? "有" : "无"],
        ["产品形态", slotState.productForm || "未指定"],
        ["旅行偏好", slotState.preference || "未指定"],
        ["预算倾向", slotState.budget || "未指定"],
        ["定制程度", slotState.customization || "标品优先"],
      ];
    }

    function renderSlots() {
      const slotList = document.getElementById("slot-list");
      slotList.innerHTML = "";
      slotRows().forEach(([label, value]) => {
        const el = document.createElement("div");
        el.className = "slot";
        el.innerHTML = `<div class="slot-label">${label}</div><div class="slot-value">${value}</div>`;
        slotList.appendChild(el);
      });
    }

    function renderLiveGroups(card) {
      if (!card.liveQueryEnabled) {
        return `<div class="muted" style="margin-top:10px;">未配置生产 token，当前只显示规则推荐和预估价。</div>`;
      }
      if (!card.liveGroups.length) {
        return `<div class="muted" style="margin-top:10px;">当前日期范围内没有匹配到真实可下单团期。</div>`;
      }

      return `
        <div class="section-title">真实可下单团期</div>
        <div class="group-table-wrap">
          <table class="group-table">
            <thead>
              <tr>
                <th>团队代码</th>
                <th>产品名称</th>
                <th>业务类型</th>
                <th>出发日期</th>
                <th>结束日期</th>
                <th>库存</th>
                <th>已占</th>
                <th>剩余</th>
                <th>售价</th>
              </tr>
            </thead>
            <tbody>
              ${card.liveGroups.map((group) => `
                <tr>
                  <td>${group.travelGroupCode}</td>
                  <td>${group.travelTypeDesc || card.title}</td>
                  <td>${group.businessType || "待确认"}</td>
                  <td>${group.groupBeginDate || "待确认"}</td>
                  <td>${group.groupEndDate || "待确认"}</td>
                  <td>${group.productNum}</td>
                  <td>${group.soldNum}</td>
                  <td>${group.saleNum}</td>
                  <td>${group.startingPrice ? `¥${formatCurrency(group.startingPrice)}` : "待确认"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function addMessage(role, content, cards = null) {
      const container = document.getElementById("messages");
      const message = document.createElement("div");
      message.className = `message ${role}`;

      const roleName = role === "assistant" ? "Assistant" : "Sales";
      message.innerHTML = `
        <div class="message-meta">${roleName}</div>
        <div class="message-body"></div>
      `;
      message.querySelector(".message-body").textContent = content;

      if (cards && cards.length) {
        const stack = document.createElement("div");
        stack.className = "result-stack";
        cards.forEach((card) => {
          const el = document.createElement("div");
          el.className = "result-card";
          el.innerHTML = `
            <div class="result-top">
              <div>
                <h4>${card.title}</h4>
                <div class="muted">${card.meta}</div>
              </div>
              <div class="score">${card.score}分</div>
            </div>
            <div class="muted">${card.description}</div>
            <div class="pill-row">${card.tags.map((tag) => `<span class="pill">${tag}</span>`).join("")}</div>
            <div class="section-title">推荐行程</div>
            <div class="muted">${card.itinerary}</div>
            <div class="section-title">推荐理由</div>
            <ul class="bullet-list">${card.reasons.map((item) => `<li>${item}</li>`).join("")}</ul>
            <div class="section-title">预估价格</div>
            <div class="muted">${card.priceText}</div>
            <div class="muted">${card.unitText}</div>
            <div class="muted" style="margin-top:4px;">${card.note}</div>
            <div class="section-title">注意事项</div>
            <ul class="bullet-list">${card.risks.map((item) => `<li>${item}</li>`).join("")}</ul>
            <div class="section-title">销售建议</div>
            <div class="muted">${card.salesTip}</div>
            ${renderLiveGroups(card)}
          `;
          stack.appendChild(el);
        });
        message.appendChild(stack);
      }

      container.appendChild(message);
      container.scrollTop = container.scrollHeight;
    }

    async function handleUserMessage(text) {
      addMessage("user", text);
      const parsed = parseDemand(text);
      mergeSlots(parsed);
      renderSlots();

      const missing = getMissingSlots();
      if (missing.length) {
        addMessage("assistant", buildFollowUpResponse(missing));
        return;
      }

      const response = await buildRecommendationResponse();
      addMessage("assistant", response.intro, response.cards);
    }

    function seedPrompts() {
      const container = document.getElementById("quick-prompts");
      QUICK_PROMPTS.forEach((prompt) => {
        const button = document.createElement("button");
        button.textContent = prompt;
        button.addEventListener("click", () => {
          document.getElementById("user-input").value = prompt;
          sendMessage();
        });
        container.appendChild(button);
      });
    }

    function resetConversation() {
      Object.assign(slotState, {
        destination: null,
        month: null,
        dateText: null,
        nights: null,
        days: null,
        travelers: null,
        adults: null,
        children: null,
        elders: false,
        foreignGuests: false,
        productForm: null,
        preference: null,
        budget: null,
        customization: "标品优先",
      });

      const messages = document.getElementById("messages");
      messages.innerHTML = "";
      renderSlots();
      addMessage(
        "assistant",
        "你可以直接把客户需求丢给我，例如：\n“客户想 4 月去林芝看桃花，5 晚 6 天，2 大 1 小，偏轻松，预算品质优先。”\n\n如果信息不完整，我会继续追问；如果信息够了，我会直接给你推荐产品和预估价。若已配置生产 token，我还会同步查询真实团期、库存和售价。"
      );
    }

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const text = input.value.trim();
      if (!text) return;
      const sendButton = document.getElementById("send-button");
      sendButton.disabled = true;
      sendButton.textContent = "处理中...";
      try {
        await handleUserMessage(text);
        input.value = "";
        input.focus();
      } catch (error) {
        addMessage("assistant", `查询失败：${error.message}。如果你已经配置了 token，先确认 token 还有效，再重试。`);
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = "发送";
      }
    }

    document.getElementById("send-button").addEventListener("click", sendMessage);
    document.getElementById("clear-button").addEventListener("click", resetConversation);
    document.getElementById("save-token-button").addEventListener("click", () => {
      const input = document.getElementById("gds-token");
      const token = sanitizeToken(input.value);
      if (!token) {
        updateAuthStatus("请先粘贴 token 再保存。");
        return;
      }
      if (!/^[A-Za-z0-9._-]+$/.test(token)) {
        updateAuthStatus("token 里包含异常字符。请只粘贴纯 Authorization 值，不要带中文标点或额外说明。");
        return;
      }
      setStoredToken(token);
      input.value = "";
      updateAuthStatus("token 已清洗并保存。现在可以直接查询真实团期。");
    });
    document.getElementById("toggle-token-button").addEventListener("click", () => {
      const input = document.getElementById("gds-token");
      const button = document.getElementById("toggle-token-button");
      const nextType = input.type === "password" ? "text" : "password";
      input.type = nextType;
      button.textContent = nextType === "password" ? "显示" : "隐藏";
    });
    document.getElementById("clear-token-button").addEventListener("click", () => {
      setStoredToken("");
      document.getElementById("gds-token").value = "";
    });
    document.getElementById("user-input").addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") sendMessage();
    });

    updateAuthStatus();
    seedPrompts();
    resetConversation();
  </script>
</body>
</html>
